name: Deploy Astro to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build web
        run: pnpm --filter @avku/web build
        env:
          # Абсолютні URL Vercel-API (статика на GitHub Pages не має serverless).
          # Значення задаються в Settings → Secrets and variables → Actions → Variables.
          # Якщо порожні — фронтенд відкотиться на відносний /api/* (працює лише на Vercel).
          PUBLIC_CONTACT_API_URL: ${{ vars.PUBLIC_CONTACT_API_URL }}
          PUBLIC_MONO_API_URL: ${{ vars.PUBLIC_MONO_API_URL }}
          PUBLIC_MONO_SEND_ID: ${{ vars.PUBLIC_MONO_SEND_ID }}

      - name: Disable Jekyll
        run: touch apps/web/dist/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
    steps:
      - uses: actions/deploy-pages@v4
